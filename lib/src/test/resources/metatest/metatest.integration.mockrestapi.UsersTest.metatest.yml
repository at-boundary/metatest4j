version: "1.0"

# Class-level settings override
settings:
  stop_on_first_catch: false

# ── Method-level overrides ────────────────────────────────────────────────────
# Note: user_has_email and user_has_username are defined in
# metatest/features/user-management.yml and applied automatically
# to the methods listed there.

tests:

  # Profile field assertions are specific to this test's focus — kept here
  testGetUser:
    endpoints:
      /api/v1/users/{id}:
        GET:
          invariants:
            - name: profile_first_name_present
              field: profile.firstName
              is_not_null: true

            - name: profile_last_name_present
              field: profile.lastName
              is_not_null: true

  # Explicitly excluded: this test asserts sms IS null, which interacts
  # unpredictably with null/missing field mutations on that field.
  testUserPreferencesWithNullValues:
    exclude: true
