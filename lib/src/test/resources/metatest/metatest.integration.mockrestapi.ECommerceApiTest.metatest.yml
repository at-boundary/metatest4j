version: "1.0"

# Class-level settings override
settings:
  stop_on_first_catch: false

contract:
  empty_list: { enabled: true }

# ── Method-level overrides ────────────────────────────────────────────────────
# Note: user and order invariants are defined in metatest/features/ and applied
# automatically to the relevant methods via test mappings in those files.

tests:

  # testGetUsersList asserts assertNull(thirdUserAvatar) — explicit null expectation
  # that would interact unpredictably with null/missing mutations.
  testGetUsersList:
    exclude: true

  # testGetOrdersList is a paginated list endpoint; skip to reduce noise.
  testGetOrdersList:
    exclude: true
